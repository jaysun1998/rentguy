[phases.setup]
nixPkgs = ['python310', 'nodejs_18', 'npm-9_x']

[phases.install]
cmds = [
  'pip install -r backend/requirements.txt',
  'cd frontend && npm ci'
]

[phases.build]
cmds = [
  'cd frontend && npm run build:ci',
  'mkdir -p static',
  'cp -r frontend/dist/* static/ || true'
]

[start]
cmd = 'python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT'